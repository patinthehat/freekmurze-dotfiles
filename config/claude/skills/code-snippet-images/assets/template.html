<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 675px;
    background: #f0ece8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0;
    overflow: hidden;
  }

  .card {
    width: 1160px;
    background: #faf8f6;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.08);
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
  }

  .header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: #f5f2ef;
  }

  .dots { display: flex; gap: 8px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; }
  .dot:nth-child(1) { background: #ef4444; }
  .dot:nth-child(2) { background: #eab308; }
  .dot:nth-child(3) { background: #22c55e; }

  .filename { color: #6b7280; font-size: 15px; margin-left: 8px; }

  .code {
    padding: 36px 48px;
    font-size: 25px;
    line-height: 1.8;
    color: #24292e;
  }

  /* === Syntax highlighting classes === */
  .keyword    { color: #22863a; }           /* use, function, class, return, new */
  .string     { color: #032f62; }           /* 'quoted strings' */
  .method     { color: #6f42c1; }           /* method names, function calls */
  .class-name { color: #6f42c1; }           /* class/namespace names */
  .comment    { color: #6a737d; font-style: italic; }
  .variable   { color: #e36209; }           /* $variables */
  .arrow      { color: #24292e; }           /* -> and => */
  .punctuation{ color: #24292e; }           /* brackets, semicolons, etc. */
  .facade     { color: #6f42c1; }           /* Facade names like Pdf:: */
  .named-arg  { color: #e36209; }           /* PHP named arguments (key:) */
  .env-key    { color: #22863a; font-weight: 500; } /* .env keys */
  .env-val    { color: #032f62; }           /* .env values */
  .attr       { color: #6f42c1; }           /* HTML/Blade attributes */
  .tag        { color: #22863a; }           /* HTML/Blade tags */
  .number     { color: #005cc5; }           /* numeric literals */
  .type       { color: #6f42c1; }           /* type hints */
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <span class="filename"><!-- FILENAME --></span>
    </div>
    <div class="code">
      <!-- CODE CONTENT -->
    </div>
  </div>
</body>
</html>
